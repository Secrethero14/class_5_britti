<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্টুডেন্ট লগইন - মডেল টেস্ট</title>
    <style>
        body { font-family: 'Kalpurush', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column;}
        
        /* আপনার কাস্টম মেসেজ বক্সের ডিজাইন */
        .custom-message-box {
            background-color: #fffde7;
            border-left: 5px solid #fbc02d;
            padding: 15px 20px;
            border-radius: 8px;
            max-width: 400px;
            width: 90%;
            margin-bottom: 20px;
            color: #333;
            font-size: 16px;
            line-height: 1.5;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
        }

        .login-card { background-color: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        .login-card h2 { color: #333; margin-bottom: 30px; font-size: 24px; }
        
        .profile-btn { width: 100%; background-color: #4CAF50; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 15px; transition: 0.3s; }
        .profile-btn:hover { background-color: #388E3C; }
        
        .add-new-btn { width: 100%; background-color: #008CBA; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .add-new-btn:hover { background-color: #007399; }
        
        #newProfileForm { display: none; margin-top: 20px; text-align: left; }
        .input-field { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="custom-message-box">
        <strong>📌 নোটিশ বোর্ড:</strong><br>
        বৃত্তি পরীক্ষার মডেল টেস্টে সবাইকে স্বাগতম! পরীক্ষা শুরু করার আগে নিজের প্রোফাইল সিলেক্ট করো অথবা নতুন করে তোমার নাম ও ফোন নাম্বার দিয়ে যুক্ত হও।
    </div>
    <div class="login-card">
        <h2 id="titleText">কে পরীক্ষা দিচ্ছে?</h2>
        
        <div id="profileList"></div>
        
        <button class="add-new-btn" onclick="showNewProfileForm()">+ নতুন শিক্ষার্থী যোগ করুন</button>

        <div id="newProfileForm">
            <input type="text" id="studentName" class="input-field" placeholder="শিক্ষার্থীর নাম">
            <input type="number" id="studentPhone" class="input-field" placeholder="মোবাইল নাম্বার (আইডি হিসেবে)">
            <button class="profile-btn" style="background-color: #FF9800;" onclick="saveAndLogin()">প্রবেশ করুন</button>
        </div>
    </div>

<script>
    window.onload = function() {
        loadProfiles();
    };

    function loadProfiles() {
        const savedProfiles = JSON.parse(localStorage.getItem("studentProfiles")) || [];
        const profileListDiv = document.getElementById("profileList");
        profileListDiv.innerHTML = "";

        if (savedProfiles.length > 0) {
            savedProfiles.forEach(profile => {
                // ফোন নাম্বারের শেষ ৩ ডিজিট বের করার লজিক
                let shortPhone = profile.phone;
                if(shortPhone && shortPhone.length >= 3) {
                    shortPhone = "..." + shortPhone.slice(-3);
                }

                const btn = document.createElement("button");
                btn.className = "profile-btn";
                // নাম এবং শেষ ৩ ডিজিট দেখাবে (যেমন: rr (...241))
                btn.innerText = `${profile.name} (${shortPhone})`; 
                btn.onclick = function() { loginWithProfile(profile.phone); };
                profileListDiv.appendChild(btn);
            });
        } else {
            showNewProfileForm();
        }
    }

    function showNewProfileForm() {
        document.getElementById("newProfileForm").style.display = "block";
        document.getElementById("titleText").innerText = "নতুন শিক্ষার্থী নিবন্ধন";
    }

    function saveAndLogin() {
        const name = document.getElementById("studentName").value.trim();
        const phone = document.getElementById("studentPhone").value.trim();

        if (name === "" || phone === "") {
            alert("দয়া করে নাম এবং মোবাইল নাম্বার দিন।");
            return;
        }

        let savedProfiles = JSON.parse(localStorage.getItem("studentProfiles")) || [];
        
        // চেক করা হচ্ছে এই নাম্বার আগে থেকেই আছে কি না
        const existingProfile = savedProfiles.find(p => p.phone === phone);
        if (!existingProfile) {
            savedProfiles.push({ name: name, phone: phone });
            localStorage.setItem("studentProfiles", JSON.stringify(savedProfiles));
        }

        loginWithProfile(phone);
    }

    function loginWithProfile(phoneId) {
        localStorage.setItem("loggedInUserID", phoneId);
        window.location.href = "dashboard.html";
    }
</script>
</body>
</html>
