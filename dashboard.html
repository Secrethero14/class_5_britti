<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্টুডেন্ট ড্যাশবোর্ড</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Kalpurush', Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        
        /* Navbar */
        .navbar { background-color: #4CAF50; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100;}
        .navbar h2 { margin: 0; font-size: 22px; }
        .logout-btn { background: #f44336; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s;}
        .logout-btn:hover { background: #d32f2f; }
        
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        
        /* Welcome Box */
        .welcome-box { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 4px solid #2196F3;}
        .welcome-box h3 { margin: 0; color: #333; font-size: 24px;}
        .welcome-box p { color: #666; font-size: 16px; margin: 5px 0 0 0;}
        
        /* Tabs */
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #e0e0e0; color: #333; border: none; padding: 12px 25px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #2196F3; color: white; box-shadow: 0 4px 10px rgba(33, 150, 243, 0.3); }
        
        /* Exam Cards */
        .exam-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; border-left: 5px solid #4CAF50;}
        .exam-card.paid-exam { border-left: 5px solid #FF9800; }
        .exam-card.history-exam { border-left: 5px solid #607D8B; }
        
        .exam-info h4 { margin: 0 0 5px 0; font-size: 20px; color: #333; }
        .exam-info p { margin: 0; color: #666; font-size: 15px; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 8px;}
        .badge-free { background: #e8f5e9; color: #2e7d32; border: 1px solid #4CAF50;}
        .badge-paid { background: #fff3e0; color: #e65100; border: 1px solid #FF9800;}
        
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .action-btn { color: white; border: none; padding: 10px 15px; border-radius: 5px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        .start-btn { background: #4CAF50; } .start-btn:hover { background: #388E3C; }
        .premium-btn { background: #FF9800; } .premium-btn:hover { background: #F57C00; }
        .result-btn { background: #2196F3; } .result-btn:hover { background: #1976D2; }
        .practice-btn { background: #9E9E9E; } .practice-btn:hover { background: #757575; }
        
        /* Modal Popup */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 12px; text-align: center; max-width: 350px; width: 90%; box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: slideDown 0.3s ease-out; }
        @keyframes slideDown { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-content h3 { color: #FF9800; margin-top: 0; font-size: 22px; border-bottom: 2px solid #ffe0b2; padding-bottom: 10px;}
        .whatsapp-btn { background: #25D366; color: white; padding: 12px 20px; border-radius: 30px; text-decoration: none; display: inline-block; margin-top: 15px; font-weight: bold; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); font-size: 16px;}
        .close-btn { background: transparent; color: #777; border: none; font-size: 15px; cursor: pointer; margin-top: 20px; text-decoration: underline; }
        
        #loading { text-align: center; font-size: 18px; color: #666; margin-top: 50px; font-weight: bold;}
    </style>
</head>
<body>

<div class="navbar">
    <h2>ড্যাশবোর্ড</h2>
    <button class="logout-btn" onclick="logout()">লগআউট</button>
</div>

<div class="container">
    <div class="welcome-box">
        <h3>স্বাগতম!</h3>
        <p>স্টুডেন্ট আইডি: <span id="displayPhone"></span></p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tabNew" onclick="switchTab('new')">📚 নতুন পরীক্ষাসমূহ</button>
        <button class="tab-btn" id="tabHistory" onclick="switchTab('history')">🕒 আমার হিস্ট্রি</button>
    </div>

    <div id="loading">ডেটা লোড হচ্ছে, দয়া করে অপেক্ষা করুন...</div>
    
    <div id="newExamsContainer"></div>
    <div id="historyContainer" style="display: none;"></div>
</div>

<div id="premiumModal" class="modal">
    <div class="modal-content">
        <h3>🔒 প্রিমিয়াম এক্সাম</h3>
        <p style="font-size: 16px; color: #444; line-height: 1.5;">সবগুলো এক্সাম দিতে চাইলে নিচের বাটনে ক্লিক করে WhatsApp নাম্বারে যোগাযোগ করুন।</p>
        <a href="https://wa.me/8801925251621?text=Ami%20premium%20exam%20gulo%20dite%20chai" target="_blank" class="whatsapp-btn">💬 হোয়াটসঅ্যাপে মেসেজ দিন</a>
        <br>
        <button class="close-btn" onclick="closeModal()">বন্ধ করুন</button>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyAXFM4AK9ksDFF3yfR_R9DQDNhePcApYWY",
        authDomain: "primary-scholarship-exam.firebaseapp.com",
        databaseURL: "https://primary-scholarship-exam-default-rtdb.firebaseio.com",
        projectId: "primary-scholarship-exam",
        storageBucket: "primary-scholarship-exam.firebasestorage.app",
        messagingSenderId: "938899950508",
        appId: "1:938899950508:web:9e4d3c77aee2578ddc8809"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // আপনার Apps Script Link
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbzl2udPUqkEWSb-bnVi0ILkx6UfMXGC3zPMchxWR7voML1TvqzZ2qjD7ZUu3WfwAV7g/exec";
    
    let studentPhone = localStorage.getItem("loggedInUserID");

    window.onload = function() {
        if (!studentPhone) { window.location.replace("login.html"); return; }
        document.getElementById('displayPhone').innerText = studentPhone;
        loadDashboardData();
    };

    function loadDashboardData() {
        fetch(SHEET_URL + "?action=getDashboard")
        .then(res => res.json())
        .then(data => {
            document.getElementById('loading').style.display = 'none';
            renderNewExams(data.exams, data.paidUsers);
            renderHistoryExams(data.exams);
        })
        .catch(err => {
            document.getElementById('loading').innerText = "ডেটা লোড করতে সমস্যা হচ্ছে। ইন্টারনেট চেক করুন।";
        });
    }

    function renderNewExams(exams, paidUsers) {
        const container = document.getElementById('newExamsContainer');
        container.innerHTML = "";
        
        if (!exams || exams.length === 0) {
            container.innerHTML = "<h3 style='text-align:center; color:#f44336;'>নতুন কোনো পরীক্ষা পাওয়া যায়নি।</h3>";
            return;
        }

        let isPremiumUser = paidUsers.includes(studentPhone.toString());

        exams.forEach(exam => {
            let isPaidExam = exam.Type && exam.Type.toLowerCase() === 'paid';
            let canAccess = !isPaidExam || isPremiumUser;
            
            let badgeHtml = isPaidExam ? `<span class="badge badge-paid">Premium 👑</span>` : `<span class="badge badge-free">Free</span>`;
            let cardClass = isPaidExam ? "exam-card paid-exam" : "exam-card";
            
            let buttonHtml = "";
            if (canAccess) {
                buttonHtml = `<button class="action-btn start-btn" onclick="startExam('${exam.Tab_ID}', '${exam.Exam_Name}', ${exam.Total_Time}, '${exam.Instruction}', 'live')">🚀 শুরু করুন</button>`;
            } else {
                buttonHtml = `<button class="action-btn premium-btn" onclick="openModal()">🔒 প্রিমিয়াম</button>`;
            }

            container.innerHTML += `
                <div class="${cardClass}">
                    <div class="exam-info">
                        ${badgeHtml}
                        <h4>${exam.Exam_Name}</h4>
                        <p><b>ক্যাটাগরি:</b> ${exam.Category} | <b>সময়:</b> ${exam.Total_Time} মিনিট | <b>নম্বর:</b> ${exam.Total_Marks}</p>
                    </div>
                    <div class="btn-group">${buttonHtml}</div>
                </div>
            `;
        });
    }

    function renderHistoryExams(allExams) {
        const container = document.getElementById('historyContainer');
        container.innerHTML = "<div style='text-align:center;'>ইতিহাস লোড হচ্ছে...</div>";

        // ফায়ারবেস থেকে স্টুডেন্টের হিস্ট্রি টানা হচ্ছে
        database.ref('Students_Data/' + studentPhone + '/exam_history').once('value').then(snap => {
            container.innerHTML = "";
            if (!snap.exists()) {
                container.innerHTML = "<p style='text-align:center; color:#f44336; font-weight:bold;'>আপনি এখনো কোনো পরীক্ষা দেননি।</p>";
                return;
            }

            let historyData = snap.val();
            let hasHistory = false;

            allExams.forEach(exam => {
                if (historyData[exam.Tab_ID]) {
                    hasHistory = true;
                    let dateStr = historyData[exam.Tab_ID].date || "অজানা তারিখ";
                    
                    container.innerHTML += `
                        <div class="exam-card history-exam">
                            <div class="exam-info">
                                <h4>${exam.Exam_Name}</h4>
                                <p><b>সর্বশেষ অংশগ্রহণ:</b> ${dateStr}</p>
                            </div>
                            <div class="btn-group">
                                <button class="action-btn result-btn" onclick="viewResult('${exam.Tab_ID}', '${exam.Exam_Name}')">📊 ফলাফল দেখুন</button>
                                <button class="action-btn practice-btn" onclick="startExam('${exam.Tab_ID}', '${exam.Exam_Name}', ${exam.Total_Time}, '${exam.Instruction}', 'practice')">🔁 আবার প্র্যাকটিস</button>
                            </div>
                        </div>
                    `;
                }
            });

            if (!hasHistory) {
                container.innerHTML = "<p style='text-align:center; color:#f44336; font-weight:bold;'>আপনি এখনো কোনো পরীক্ষা দেননি।</p>";
            }
        }).catch(err => {
            container.innerHTML = "<p style='text-align:center; color:red;'>ইতিহাস লোড করতে সমস্যা হয়েছে।</p>";
        });
    }

    function startExam(tabId, name, time, instruction, mode) {
        sessionStorage.setItem("currentExamID", tabId);
        sessionStorage.setItem("currentExamName", name);
        sessionStorage.setItem("currentExamTime", time);
        sessionStorage.setItem("currentExamInstruction", instruction);
        sessionStorage.setItem("examMode", mode); // live or practice
        window.location.href = "exam.html";
    }

    function viewResult(tabId, name) {
        sessionStorage.setItem("currentExamID", tabId);
        sessionStorage.setItem("currentExamName", name);
        window.location.href = "result.html";
    }

    function openModal() { document.getElementById('premiumModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('premiumModal').style.display = 'none'; }

    function switchTab(tab) {
        document.getElementById('tabNew').classList.remove('active');
        document.getElementById('tabHistory').classList.remove('active');
        document.getElementById('newExamsContainer').style.display = 'none';
        document.getElementById('historyContainer').style.display = 'none';

        if (tab === 'new') {
            document.getElementById('tabNew').classList.add('active');
            document.getElementById('newExamsContainer').style.display = 'block';
        } else {
            document.getElementById('tabHistory').classList.add('active');
            document.getElementById('historyContainer').style.display = 'block';
        }
    }

    function logout() {
        localStorage.removeItem("loggedInUserID");
        window.location.replace("login.html");
    }
</script>
</body>
</html>
